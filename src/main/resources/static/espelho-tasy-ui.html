<!DOCTYPE html>
<html lang="pt-BR">
<head>

        :root {
            color-scheme: light;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f5f7fb;
            color: #1f2937;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #d7deea;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        h1, h2 {
            margin-top: 0;
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #b8c4d6;
            border-radius: 8px;
            font: inherit;
            background: #fff;
        }

        textarea {
            min-height: 420px;
            resize: vertical;
            font-family: Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        button {
            border: 0;
            border-radius: 8px;
            padding: 12px 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .primary {
            background: #2563eb;
            color: #fff;
        }

        .secondary {
            background: #e5e7eb;
            color: #111827;
        }

        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            overflow: auto;
            min-height: 180px;
        }

        .status {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            background: #e0f2fe;
            color: #075985;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        .muted {
            color: #4b5563;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        <div class="grid grid-2">
            <section>

                <input id="origem" type="text" value="ui-manual">

                <label for="tipoCarga" style="margin-top: 16px;">Tipo de carga</label>
                <select id="tipoCarga">
                    <option value="todos">Todos os dados</option>
                    <option value="secao">Carga individual por secao</option>
                </select>

                <label for="secao" style="margin-top: 16px;">Secao individual</label>
                <select id="secao" disabled>
                    <option value="pessoasJuridicas">Pessoas juridicas</option>

                    <option value="leads">Leads</option>

                    <option value="clientes">Clientes</option>
                    <option value="canais">Canais</option>
                    <option value="prospects">Prospects</option>
                    <option value="produtos">Produtos</option>

                    <option value="propostasCliente">Propostas cliente</option>
                    <option value="propostasCanal">Propostas canal</option>
                    <option value="solicitacoesContrato">Solicitacoes contrato</option>
                    <option value="contratos">Contratos</option>
                    <option value="dependentesContrato">Dependentes contrato</option>
                </select>

                <label for="arquivo" style="margin-top: 16px;">Arquivo JSON</label>

                <label for="conteudoJson" style="margin-top: 16px;">Conteudo JSON</label>
                <textarea id="conteudoJson" spellcheck="false"></textarea>

                <div class="actions">
                    <button id="preencherExemplo" class="secondary" type="button">Recarregar Exemplo Completo</button>
                    <button id="limpar" class="secondary" type="button">Limpar</button>
                    <button id="enviar" class="primary" type="button">Persistir Integracao</button>
                </div>
            </section>

            <section>
                <h2>Resultado</h2>
                <pre id="resultado">Aguardando envio...</pre>

               
            </section>
        </div>
    </div>
</main>

    function montarExemploPorSecao(secao) {
        return {
            [secao]: exemplo[secao] || []
        };
    }

    function carregarExemploNaTela() {
        if (tipoCargaEl.value === "secao") {
            conteudoJsonEl.value = JSON.stringify(montarExemploPorSecao(secaoEl.value), null, 2);
            return;
        }

        conteudoJsonEl.value = JSON.stringify(exemplo, null, 2);
    }

    function setStatus(texto, error = false) {
        statusEl.textContent = texto;
        statusEl.className = error ? "status error" : "status";
    }

    async function verificarBackend() {
        try {
            const response = await fetch("/api/espelho-tasy/health");
            if (!response.ok) {
                throw new Error("Backend indisponivel");
            }
            setStatus("Backend pronto para receber integracoes manuais.");
        } catch (error) {
            setStatus("Nao foi possivel acessar a API. Confirme se a aplicacao esta em execucao.", true);
        }
    }

    arquivoEl.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) {
            return;
        }

        conteudoJsonEl.value = await file.text();
        setStatus(`Arquivo carregado: ${file.name}`);
    });

    tipoCargaEl.addEventListener("change", () => {
        const cargaPorSecao = tipoCargaEl.value === "secao";
        secaoEl.disabled = !cargaPorSecao;
        carregarExemploNaTela();
        setStatus(
            cargaPorSecao
                ? "Modo individual ativo. A tela prepara o JSON da secao selecionada."
                : "Modo completo ativo. A tela prepara o JSON com todas as secoes."
        );
    });

    secaoEl.addEventListener("change", () => {
        if (tipoCargaEl.value !== "secao") {
            return;
        }

        carregarExemploNaTela();
        setStatus(`Secao individual selecionada: ${secaoEl.value}.`);
    });

    document.getElementById("preencherExemplo").addEventListener("click", () => {
        carregarExemploNaTela();
        setStatus(
            tipoCargaEl.value === "secao"
                ? `Exemplo individual da secao ${secaoEl.value} preenchido na tela.`
                : "Exemplo completo do fluxo preenchido na tela."
        );
    });

    document.getElementById("limpar").addEventListener("click", () => {
        conteudoJsonEl.value = "";
        resultadoEl.textContent = "Aguardando envio...";
        arquivoEl.value = "";
        setStatus("Formulario limpo.");
    });

    document.getElementById("enviar").addEventListener("click", async () => {
        const conteudoJson = conteudoJsonEl.value.trim();
        if (!conteudoJson) {
            setStatus("Informe o JSON antes de persistir.", true);
            return;
        }

        resultadoEl.textContent = "Processando...";
        setStatus("Enviando JSON para persistencia...");

        try {
            const cargaPorSecao = tipoCargaEl.value === "secao";
            const endpoint = cargaPorSecao
                ? "/api/espelho-tasy/carga-secao/processar-json-manual"
                : "/api/espelho-tasy/carga-completa/processar-json-manual";
            const body = {
                conteudoJson,
                origem: origemEl.value.trim() || "ui-manual"
            };

            if (cargaPorSecao) {
                body.secao = secaoEl.value;
            }

            const response = await fetch(endpoint, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            const responseBody = await response.json();
            if (!response.ok) {
                throw new Error(JSON.stringify(responseBody, null, 2));
            }

            resultadoEl.textContent = JSON.stringify(responseBody, null, 2);
            setStatus(
                cargaPorSecao
                    ? `Integracao individual da secao ${secaoEl.value} persistida com sucesso.`
                    : "Integracao completa persistida com sucesso."
            );
        } catch (error) {
            resultadoEl.textContent = error.message;
            setStatus("Falha ao persistir a integracao manual.", true);
        }
    });

    carregarExemploNaTela();
    verificarBackend();
</script>
